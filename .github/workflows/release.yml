name: Release

# Builds the sideloadable VR plugin jar from a tag and attaches it to a draft
# GitHub release. Draft on purpose: the build is automatic, publishing is not.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build, without the leading v (e.g. 0.1.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Resolve versions
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          runelite=$(grep '^runeliteVersion=' vrgpu-plugin/gradle.properties | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "runelite=$runelite" >> "$GITHUB_OUTPUT"

      - name: Build plugin jar
        run: ./gradlew -p vrgpu-plugin jar -PpluginVersion=${{ steps.vars.outputs.version }}

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.vars.outputs.version }}
          RUNELITE: ${{ steps.vars.outputs.runelite }}
        run: |
          jar=$(ls vrgpu-plugin/build/libs/*.jar)
          gh release create "v$VERSION" "$jar" LICENSE \
            --draft \
            --prerelease \
            --title "$VERSION — RuneLite $RUNELITE" \
            --notes "Built against RuneLite client $RUNELITE. Install instructions are in the [README](../blob/master/README.md).

          Experimental. Read the warnings in the README before using this on an account you care about."
